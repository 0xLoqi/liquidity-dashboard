name: Keep Backend Awake

on:
  schedule:
    # Every 14 minutes — Render free tier sleeps after 15 min idle
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: |
          # 60s timeout covers a worst-case cold start. Don't fail the workflow
          # on transient errors — we just want to keep the service warm.
          curl -fsS --max-time 60 "${{ vars.BACKEND_URL }}/health" \
            || echo "Ping failed (backend may be cold-starting); will retry next cycle."
